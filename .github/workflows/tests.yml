name: Tests

on:
  push:
  pull_request:

jobs:
  pure-python:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install minimal test dependency
        run: python -m pip install --upgrade pip numpy

      - name: Run pure-Python tests
        run: python -m unittest tests.test_pymiedap_defaults.ModelDefaultsTest tests.test_pymiedap_defaults.GeometryUtilitiesTest -v

  native:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11"]

    env:
      MPLCONFIGDIR: /tmp/mpl

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install native toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gfortran

      - name: Install package and test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install .[test]

      - name: Run full test suite
        run: python -m unittest discover -s tests -v
